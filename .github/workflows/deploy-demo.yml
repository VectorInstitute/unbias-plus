name: Deploy UnBias Plus

# Trigger on pushes to main that touch relevant files, or manually.
on:
  push:
    branches: [main, deploy]
    paths:
      - 'src/unbias_plus/**'
      - 'Dockerfile'
      - 'Dockerfile.vllm'
      - 'pyproject.toml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

# Prevent concurrent deployments on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east4
  GAR_LOCATION: us-east4
  REPOSITORY: unbias-plus
  DEMO_SERVICE: unbias-plus-demo
  VLLM_SERVICE: unbias-plus-vllm
  MODEL_CACHE_BUCKET: unbias-plus-model-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Detect which components changed ────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      demo: ${{ steps.decide.outputs.demo }}
      vllm: ${{ steps.decide.outputs.vllm }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            demo:
              - 'src/unbias_plus/**'
              - 'Dockerfile'
              - 'pyproject.toml'
            vllm:
              - 'Dockerfile.vllm'

      # On workflow_dispatch, treat everything as changed so a full
      # redeploy is triggered regardless of which files differ.
      - name: Resolve what to build
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "demo=true" >> $GITHUB_OUTPUT
            echo "vllm=true"  >> $GITHUB_OUTPUT
          else
            echo "demo=${{ steps.filter.outputs.demo }}" >> $GITHUB_OUTPUT
            echo "vllm=${{ steps.filter.outputs.vllm }}"  >> $GITHUB_OUTPUT
          fi

  # ── Build and push the demo app image ──────────────────────────────────────
  build-demo:
    name: Build Demo Image
    needs: [changes]
    if: needs.changes.outputs.demo == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
            --location=${{ env.GAR_LOCATION }} --project=${{ env.PROJECT_ID }} \
            --format="get(name)" 2>/dev/null \
          || gcloud artifacts repositories create ${{ env.REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker images for UnBias Plus" \
            --quiet

      - name: Build and push demo image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.DEMO_SERVICE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.DEMO_SERVICE }}:latest
          cache-from: type=gha,scope=demo
          cache-to: type=gha,mode=max,scope=demo

  # ── Build and push the vLLM server image ───────────────────────────────────
  build-vllm:
    name: Build vLLM Image
    needs: [changes]
    if: needs.changes.outputs.vllm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push vLLM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.vllm
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.VLLM_SERVICE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.VLLM_SERVICE }}:latest
          cache-from: type=gha,scope=vllm
          cache-to: type=gha,mode=max,scope=vllm

  # ── Deploy vLLM to Cloud Run (GPU) ─────────────────────────────────────────
  #
  # Uses a Cloud Run GPU service (NVIDIA L4) with min-instances=0 (scales to
  # zero when idle). Model weights are cached in GCS so cold starts load from
  # GCS (~1-3 min) rather than downloading from HuggingFace every time.
  # vLLM handles concurrency via continuous batching and PagedAttention.
  #
  # Required GCP setup (one-time, already done):
  #   - L4 GPU quota without zonal redundancy in us-east4
  deploy-vllm:
    name: Deploy vLLM (Cloud Run GPU)
    needs: [build-vllm]
    if: needs.build-vllm.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy vLLM to Cloud Run GPU
        id: deploy
        run: |
          # Reconstruct image URL from env — avoids secret-redaction of job outputs.
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.VLLM_SERVICE }}:${{ github.sha }}"

          gcloud run deploy ${{ env.VLLM_SERVICE }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --gpu=1 \
            --gpu-type=nvidia-l4 \
            --memory=32Gi \
            --cpu=8 \
            --concurrency=4 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=3600 \
            --execution-environment=gen2 \
            --no-cpu-throttling \
            --no-gpu-zonal-redundancy \
            --allow-unauthenticated \
            --add-volume=name=hf-cache,type=cloud-storage,bucket=${{ env.MODEL_CACHE_BUCKET }} \
            --add-volume-mount=volume=hf-cache,mount-path=/hf-cache \
            --startup-probe=httpGet.path=/health,initialDelaySeconds=30,failureThreshold=80,periodSeconds=15,timeoutSeconds=5 \
            --set-env-vars="HF_HOME=/hf-cache,VLLM_CACHE_ROOT=/hf-cache/vllm_cache,TOKENIZERS_PARALLELISM=false" \
            --quiet

          URL=$(gcloud run services describe ${{ env.VLLM_SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✓ vLLM deployed at $URL"

  # ── Deploy demo app to Cloud Run (CPU) ─────────────────────────────────────
  #
  # Lightweight FastAPI app that proxies requests to the vLLM GPU service.
  # Scales to zero when idle — no GPU cost at rest.
  deploy-demo:
    name: Deploy Demo (Cloud Run CPU)
    needs: [build-demo, deploy-vllm]
    if: |
      always() &&
      needs.build-demo.result == 'success' &&
      (needs.deploy-vllm.result == 'success' || needs.deploy-vllm.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # Always resolve the current vLLM service URL — it is stable across
      # deployments (Cloud Run URL is deterministic for a given service name).
      - name: Get vLLM service URL
        id: vllm-url
        run: |
          URL=$(gcloud run services describe ${{ env.VLLM_SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "::error::vLLM service '${{ env.VLLM_SERVICE }}' not found in ${{ env.REGION }}."
            echo "::error::Run this workflow with workflow_dispatch to deploy both services."
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✓ vLLM service URL: $URL"

      # If the demo service was previously deployed with GPU (e.g. by mistake),
      # gcloud run deploy inherits resource limits from the existing revision and
      # carries the GPU forward — then fails because cpu=2/memory=2Gi don't meet
      # the GPU minimum (cpu>=4, memory>=16Gi).  Delete the service so it is
      # recreated from scratch without any GPU configuration.
      - name: Clear stale GPU config from demo service
        run: |
          GPU=$(gcloud run services describe ${{ env.DEMO_SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(spec.template.spec.containers[0].resources.limits."nvidia.com/gpu")' \
            2>/dev/null || echo "")
          if [ -n "$GPU" ] && [ "$GPU" != "0" ]; then
            echo "Demo service has GPU=$GPU — deleting service to clear GPU config."
            gcloud run services delete ${{ env.DEMO_SERVICE }} \
              --region=${{ env.REGION }} \
              --project=${{ env.PROJECT_ID }} \
              --quiet
          else
            echo "No GPU on demo service — skipping delete."
          fi

      - name: Deploy demo to Cloud Run
        id: deploy
        run: |
          # Reconstruct image URL from env — avoids secret-redaction of job outputs.
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.DEMO_SERVICE }}:${{ github.sha }}"

          gcloud run deploy ${{ env.DEMO_SERVICE }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --memory=2Gi \
            --cpu=2 \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=900 \
            --no-cpu-throttling \
            --allow-unauthenticated \
            --set-env-vars="VLLM_BASE_URL=${{ steps.vllm-url.outputs.url }}/v1,VLLM_MODEL_NAME=unbias-plus,MAX_INPUT_CHARS=1000,TOKENIZERS_PARALLELISM=false" \
            --quiet

          URL=$(gcloud run services describe ${{ env.DEMO_SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✓ Demo deployed at $URL"

      - name: Health check
        run: |
          URL="${{ steps.deploy.outputs.url }}/health"
          echo "Checking $URL..."
          for i in $(seq 1 20); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null)
            if [ "$HTTP" = "200" ]; then
              echo "✓ Health check passed"
              curl -s "$URL" | python3 -m json.tool || true
              exit 0
            fi
            echo "  Attempt $i/20 — HTTP $HTTP, retrying..."
            sleep 5
          done
          echo "✗ Demo health check failed"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## UnBias Plus — Deployment Summary

          **Commit:** `${{ github.sha }}`
          **Branch:** `${{ github.ref_name }}`
          **Triggered by:** @${{ github.actor }}

          ### Services
          | Service | URL | Notes |
          |---------|-----|-------|
          | **Demo UI** | ${{ steps.deploy.outputs.url }} | Cloud Run CPU, scales to zero |
          | **vLLM API** | ${{ steps.vllm-url.outputs.url }}/v1 | Cloud Run GPU (L4), scales to zero, GCS model cache |
          | **Health** | ${{ steps.deploy.outputs.url }}/health | |
          | **Model** | vector-institute/Qwen3-8B-UnBias-Plus-SFT | served via vLLM |

          ---
          *Deployed at $(date -u +"%Y-%m-%d %H:%M:%S UTC")*
          EOF
